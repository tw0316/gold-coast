services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gcoffers_site_dev}
      POSTGRES_USER: ${POSTGRES_USER:-gcoffers_site_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-[REDACTED_LOCAL_POSTGRES_PASSWORD]}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
