name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Comment-only Claude review
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check Claude OAuth token
        id: claude-token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not configured; skipping Claude PR review."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.claude-token.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR with Claude Code
        if: steps.claude-token.outputs.configured == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          include_fix_links: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request only. Do not edit files, commit code, push branches, create branches, approve the PR, or request changes.

            Focus on issues that matter:
            - Correctness bugs and edge cases
            - Security or privacy risks
            - Missing or weak tests for changed behavior
            - Performance or reliability regressions
            - Maintainability problems that will slow future work

            Ignore pure style preferences unless they hide a real bug or maintenance risk.
            Post concise, actionable feedback as GitHub PR comments.
            Use inline comments for specific code issues via mcp__github_inline_comment__create_inline_comment with confirmed: true.
            Use one top-level PR comment for the summary via gh pr comment.
            If there are no meaningful issues, post a short summary saying the PR looks clean.
            Only post GitHub comments. Do not return review text only in the workflow log.
          claude_args: |
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --disallowedTools "Edit,Write,MultiEdit,Replace,NotebookEditCell,Bash(git push:*),Bash(git commit:*),Bash(git checkout:*),Bash(git branch:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh pr create:*),Bash(gh pr close:*)"
