name: Claude PR Review

on:
  pull_request:
    types: [ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: Comment-only Claude review
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.comment.body == '/claude-review') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check Claude OAuth token
        id: claude-token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not configured; skipping Claude PR review."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve pull request
        id: pr
        if: steps.claude-token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          case "${{ github.event_name }}" in
            pull_request)
              pr_number="${{ github.event.pull_request.number }}"
              ;;
            issue_comment)
              pr_number="${{ github.event.issue.number }}"
              ;;
            workflow_dispatch)
              pr_number="${{ inputs.pr_number }}"
              ;;
          esac

          head_repo=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRepository --jq '.headRepository.nameWithOwner')
          head_sha=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude review for fork PR $pr_number."
          else
            echo "should_review=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.pr.outputs.should_review == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 1

      - name: Review PR with Claude Code
        if: steps.pr.outputs.should_review == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          include_fix_links: false
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            Review this pull request only. Do not edit files, commit code, push branches, create branches, approve the PR, request changes, or leave inline comments.

            Focus on issues that matter:
            - Correctness bugs and edge cases
            - Security or privacy risks
            - Missing or weak tests for changed behavior
            - Performance or reliability regressions
            - Maintainability problems that will slow future work

            Ignore pure style preferences unless they hide a real bug or maintenance risk.
            Post exactly one concise, actionable top-level PR comment.
            If there are no meaningful issues, post a short summary saying the PR looks clean.
            Only post GitHub comments. Do not return review text only in the workflow log.
          claude_args: |
            --max-turns 20
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git show:*),Bash(ls:*),Bash(cat:*),Bash(sed:*),Bash(grep:*),Bash(find:*)"
            --disallowedTools "Edit,Write,MultiEdit,Replace,NotebookEditCell,mcp__github_inline_comment__create_inline_comment,Bash(git push:*),Bash(git commit:*),Bash(git checkout:*),Bash(git branch:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh pr create:*),Bash(gh pr close:*)"
