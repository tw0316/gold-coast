version: 2

models:
  - name: contacts_latest
    description: "V1.1 current-state GHL contact table. Query this directly for contact identity, attribution, tags, and custom fields."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/contacts_latest/"
      table_type: "external_parquet"
      grain: "One latest row per GHL contact_id."
      primary_key: "contact_id"
      refresh_cadence: "Hourly after V1.1 cutover. The table is overwritten as a current-state table, not appended as repeated snapshot partitions."
      pii_level: "High"
    columns:
      - name: contact_id
        tests: [not_null, unique]
      - name: assigned_to_user_id
      - name: source
      - name: date_added
      - name: date_updated
      - name: snapshot_at
      - name: run_id

  - name: opportunities_latest
    description: "V1.1 current-state GHL opportunity table. In Gold Coast, lead = opportunity."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/opportunities_latest/"
      table_type: "external_parquet"
      grain: "One latest row per GHL opportunity_id."
      primary_key: "opportunity_id"
      refresh_cadence: "Hourly after V1.1 cutover. The table is overwritten as a current-state table."
      pii_level: "High"
    columns:
      - name: opportunity_id
        tests: [not_null, unique]
      - name: contact_id
      - name: pipeline_id
      - name: pipeline_stage_id
      - name: pipeline_stage_name
      - name: status
      - name: assigned_to_user_id
      - name: created_at
      - name: updated_at
      - name: snapshot_at
      - name: run_id

  - name: messages
    description: "V1.1 event-safe GHL conversation message/activity table."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/messages/"
      table_type: "external_parquet"
      grain: "One durable analytical row per stable GHL message_id."
      primary_key: "message_id"
      pii_level: "High"
    columns:
      - name: message_id
        tests: [not_null, unique]
      - name: conversation_id
      - name: contact_id
      - name: message_type
      - name: direction
      - name: actor_user_id
      - name: date_added
      - name: date_updated
      - name: snapshot_at
      - name: run_id

  - name: calls
    description: "V1.1 event-safe GHL call fact table enriched with recording archive metadata."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/calls/"
      table_type: "external_parquet"
      grain: "One durable analytical row per stable GHL call_message_id."
      primary_key: "call_message_id"
      pii_level: "High"
    columns:
      - name: call_message_id
        tests: [not_null, unique]
      - name: contact_id
      - name: actor_user_id
      - name: direction
      - name: call_status
      - name: duration_seconds
      - name: has_recording
      - name: date_added
      - name: date_updated
      - name: snapshot_at
      - name: run_id

  - name: call_recordings
    description: "V1.1 recording archive ledger. Stores metadata and private S3 references only, not audio bytes."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/call_recordings/"
      table_type: "external_parquet"
      grain: "One row per stable GHL call message_id recording archive result."
      primary_key: "message_id"
      pii_level: "High"
    columns:
      - name: message_id
        tests: [not_null, unique]
      - name: archival_status
      - name: object_key
      - name: s3_uri
      - name: archived_at
      - name: snapshot_at
      - name: run_id

  - name: opportunity_stage_history
    description: "V1.1 append-on-change opportunity stage/status transition history."
    meta:
      glue_database: "gold_coast"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/core/opportunity_stage_history/"
      table_type: "external_parquet"
      grain: "One row per observed opportunity stage/status transition. Unchanged opportunities do not append rows."
      primary_key: "transition_key"
      pii_level: "Moderate"
    columns:
      - name: transition_key
        tests: [not_null, unique]
      - name: opportunity_id
      - name: contact_id
      - name: previous_pipeline_stage_id
      - name: previous_pipeline_stage_name
      - name: previous_status
      - name: pipeline_stage_id
      - name: pipeline_stage_name
      - name: status
      - name: observed_at
      - name: snapshot_at
      - name: run_id

  - name: lead_response
    description: "Reporting mart for speed-to-lead, first outbound call/message, and contact-attempt metrics."
    meta:
      glue_database: "gold_coast_reporting"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/reporting/lead_response/"
      table_type: "external_parquet"
      grain: "One row per opportunity_id."
      primary_key: "opportunity_id"
      pii_level: "Moderate"
    columns:
      - name: opportunity_id
        tests: [not_null, unique]
      - name: contact_id
      - name: assigned_to_user_id
      - name: lead_created_at
      - name: first_outbound_call_at
      - name: minutes_to_first_outbound_call
      - name: first_response_at
      - name: minutes_to_first_response
      - name: has_contact_attempt
      - name: has_completed_call
      - name: snapshot_at
      - name: run_id

  - name: rep_activity_daily
    description: "Reporting mart for daily activity by event actor."
    meta:
      glue_database: "gold_coast_reporting"
      s3_location: "s3://gcoffers-data-lake/curated/ghl/v1_1/reporting/rep_activity_daily/"
      table_type: "external_parquet"
      grain: "One row per activity_date and actor_user_id."
      primary_key: "activity_date, actor_user_id"
      pii_level: "Moderate"
    columns:
      - name: activity_date
        tests: [not_null]
      - name: actor_user_id
        tests: [not_null]
      - name: calls_total
      - name: calls_outbound
      - name: calls_completed
      - name: messages_total
      - name: messages_outbound
      - name: unique_contacts_touched
      - name: first_activity_at
      - name: last_activity_at
      - name: snapshot_at
      - name: run_id
